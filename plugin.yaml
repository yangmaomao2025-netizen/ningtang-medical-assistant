# 宁唐医学助手插件配置
# Medical Assistant Plugin Configuration

name: medical-assistant
version: 1.0.0
displayName: 宁唐医学助手
description: 专业的医学问答助手插件

# 插件类型
type: service

# 需要的 OpenClaw 版本
requires:
  openclaw: ">=1.0.0"

# 插件配置
config:
  # LLM 配置
  apiKey: ""
  model: "kimi-k2.5"
  baseUrl: "https://coding.dashscope.aliyuncs.com/apps/anthropic/v1"
  
  # 医学助手配置
  medical:
    disclaimer: "以上内容仅供参考，如有疑问请咨询专业医生。"
    confidence:
      high: 0.8
      medium: 0.5
    urgentKeywords:
      - "胸痛"
      - "呼吸困难"
      - "大出血"
      - "休克"
      - "昏迷"
      - "窒息"
      - "中毒"
      - "心梗"
      - "中风"

# 路由配置
routes:
  - path: /medical/chat
    method: POST
    auth: gateway
    description: 医学问答聊天
  - path: /medical/chat/stream
    method: POST
    auth: gateway
    description: 流式医学问答
  - path: /medical/health
    method: GET
    auth: none
    description: 健康检查
